name: Release (Windows portable exe)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to attach the build to (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (Windows)
        run: pnpm tauri build

      - name: Stage portable exe
        shell: bash
        run: |
          set -euo pipefail
          src="src-tauri/target/release/pandoku.exe"
          tag="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          out="pandoku-win.exe"
          cp "$src" "$out"
          ls -la "$out"
          echo "ARTIFACT=$out" >> "$GITHUB_ENV"
          echo "TAG=$tag" >> "$GITHUB_ENV"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          # Create the release if it doesn't exist yet; then attach the binary.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "pandoku $TAG" --generate-notes
          fi
          gh release upload "$TAG" "$ARTIFACT" --clobber
